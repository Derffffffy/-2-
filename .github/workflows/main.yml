name: Final Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract Everything
        run: |
          # Находим все zip-файлы и распаковываем
          find . -name "*.zip" -exec unzip -o {} \;
          
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          # Ищем gradlew везде, даже в подпапках
          GW_PATH=$(find . -name gradlew | head -n 1)
          if [ -z "$GW_PATH" ]; then
            echo "ОШИБКА: Файл gradlew не найден даже после распаковки!"
            ls -R
            exit 1
          fi
          
          PROJECT_ROOT=$(dirname "$GW_PATH")
          echo "Проект найден в: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"
          
          # Даем права и запускаем сборку
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-mod-menu
          path: "**/build/outputs/apk/debug/*.apk"
      
